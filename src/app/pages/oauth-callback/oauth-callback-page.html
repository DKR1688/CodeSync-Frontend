<section class="callback-shell section-card">
  <p class="eyebrow">Sign in</p>
  <h1>Finishing {{ provider }} login</h1>

  @if (error()) {
    <p class="status-message status-message--error">{{ error() }}</p>
    <a class="secondary-action" routerLink="/login">Back to login</a>
  } @else {
    <p class="muted">Please wait while your account is being opened.</p>
  }
</section>
